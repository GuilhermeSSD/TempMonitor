<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMonitor</title>
    <link rel="stylesheet" href="./css/login.css">
</head>
<body>
    <div>
        <p>login</p>
        <form action="">
            <label for="login-email">login:</label>
            <input type="email" name="login-email" id="login-email">
            <label for="login-senha">senha:</label>
            <input type="password" name="login-pass" id="login-pass">
            <input type="button" value="Login">
        </form>
        <p>Register</p>
        <form action="">
            <label for="register-cpf">CPF:</label>
            <input type="cpf" name="register-cpf" id="register-cpf">
            <label for="register-name">Email:</label>
            <input type="name" name="register-name" id="register-name">
            <label for="register-email">login:</label>
            <input type="email" name="register-email" id="register-email">
            <label for="login-senha">senha:</label>
            <input type="password" name="register-pass" id="register-pass">
            <input type="button" value="Register">
        </form>
    </div>
<script src="./javascript/login.js"/></script>
</body>
</html>
